<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title }}</title>
  <script>
    MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
      }
    };
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github.min.css" />
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/languages/julia.min.js"></script>
  <script>
    window.addEventListener("DOMContentLoaded", function () {
      document.querySelectorAll("[data-tabs]").forEach(function (tabContainer) {
        var buttons = Array.from(tabContainer.querySelectorAll("[data-tab-target]"));
        var panels = Array.from(tabContainer.querySelectorAll(".output-tab-panel"));
        if (!buttons.length || !panels.length) {
          return;
        }

        function hashTokens(button) {
          var raw = button.getAttribute("data-tab-hashes") || "";
          return raw.split(",").map(function (token) { return token.trim(); }).filter(Boolean);
        }

        function activate(button, updateHash) {
          var targetId = button.getAttribute("data-tab-target");
          buttons.forEach(function (candidate) {
            var selected = candidate === button;
            candidate.classList.toggle("output-tab-btn-active", selected);
            candidate.setAttribute("aria-selected", selected ? "true" : "false");
            candidate.setAttribute("tabindex", selected ? "0" : "-1");
          });
          panels.forEach(function (panel) {
            var selected = panel.id === targetId;
            panel.classList.toggle("output-tab-panel-active", selected);
            panel.hidden = !selected;
          });

          if (updateHash) {
            var tokens = hashTokens(button);
            if (tokens.length) {
              if (window.location.hash !== "#" + tokens[0]) {
                history.replaceState(null, "", "#" + tokens[0]);
              }
            }
          }
        }

        function findButtonForHash(hashValue) {
          var normalized = hashValue.replace(/^#/, "");
          if (!normalized) {
            return null;
          }
          for (var i = 0; i < buttons.length; i += 1) {
            var button = buttons[i];
            if (button.id === normalized) {
              return button;
            }
            if (hashTokens(button).indexOf(normalized) !== -1) {
              return button;
            }
            var target = button.getAttribute("data-tab-target");
            if (target === normalized) {
              return button;
            }
          }
          return null;
        }

        buttons.forEach(function (button) {
          button.addEventListener("click", function () {
            activate(button, true);
          });
        });

        var initialButton = findButtonForHash(window.location.hash) || buttons[0];
        activate(initialButton, false);

        window.addEventListener("hashchange", function () {
          var matchedButton = findButtonForHash(window.location.hash);
          if (matchedButton) {
            activate(matchedButton, false);
          }
        });
      });

      document.querySelectorAll("pre > code").forEach(function (codeBlock) {
        var pre = codeBlock.parentElement;
        if (!pre || pre.querySelector(".copy-code-btn")) {
          return;
        }
        var button = document.createElement("button");
        button.type = "button";
        button.className = "copy-code-btn";
        button.textContent = "Copy";
        button.addEventListener("click", function () {
          navigator.clipboard.writeText(codeBlock.textContent || "").then(function () {
            button.textContent = "Copied";
            setTimeout(function () { button.textContent = "Copy"; }, 1200);
          });
        });
        pre.appendChild(button);
      });

      if (window.hljs) {
        window.hljs.highlightAll();
      }
    });
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@4/tex-mml-chtml.js"></script>
  <style>
    :root {
      --page-bg: linear-gradient(180deg, #f3eee2 0%, #fbfaf6 26%, #f6f7f2 100%);
      --panel-bg: rgba(255, 255, 255, 0.94);
      --border: #ddd3c2;
      --text: #1d1b18;
      --muted: #5c554a;
      --accent: #0d5c63;
      --accent-soft: #e5f0ef;
      --code-bg: #f3f4f6;
      --shadow: 0 24px 80px rgba(68, 55, 32, 0.08);
    }
    body.section-spec {
      --page-bg: linear-gradient(180deg, #eef4f6 0%, #f9fcfc 26%, #f4f7f8 100%);
      --panel-bg: rgba(252, 255, 255, 0.95);
      --border: #c9dbe0;
      --accent: #0b6275;
      --accent-soft: #dff0f5;
      --shadow: 0 24px 80px rgba(29, 69, 84, 0.08);
    }
    body.section-rosetta {
      --page-bg: linear-gradient(180deg, #f6efe4 0%, #fcfaf5 26%, #f8f3ea 100%);
      --panel-bg: rgba(255, 252, 247, 0.95);
      --border: #dfcfbd;
      --accent: #8d4c1f;
      --accent-soft: #f4e5d6;
      --shadow: 0 24px 80px rgba(88, 54, 24, 0.08);
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 0;
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, Georgia, serif;
      background: var(--page-bg);
      color: var(--text);
      line-height: 1.6;
    }
    main {
      max-width: 1080px;
      margin: 2rem auto;
      background: var(--panel-bg);
      padding: 2.25rem;
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(6px);
    }
    h1, h2, h3 {
      font-family: Georgia, "Times New Roman", serif;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }
    h1 {
      font-size: clamp(2rem, 4vw, 3.4rem);
      margin-top: 0;
    }
    h2 {
      margin-top: 2.2rem;
      padding-top: 0.2rem;
      border-top: 1px solid #eee4d6;
    }
    p, li, table, code {
      font-size: 1rem;
    }
    .page-nav {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
      color: var(--muted);
      font-size: 0.95rem;
    }
    .page-nav a {
      padding: 0.25rem 0.7rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.75);
      text-decoration: none;
    }
    .page-nav a.page-nav-active {
      background: var(--accent-soft);
      border-color: rgba(13, 92, 99, 0.25);
      color: var(--accent);
      font-weight: 600;
    }
    .page-nav .page-nav-edit {
      margin-left: auto;
      background: var(--accent-soft);
      border-color: rgba(13, 92, 99, 0.25);
      color: var(--accent);
      font-size: 0.9rem;
      letter-spacing: 0.01em;
    }
    .hero {
      padding: 1.4rem 1.5rem;
      border: 1px solid var(--border);
      border-radius: 16px;
      background:
        radial-gradient(circle at top right, rgba(13, 92, 99, 0.12), transparent 32%),
        linear-gradient(135deg, rgba(229, 240, 239, 0.9), rgba(255, 249, 240, 0.95));
      margin-bottom: 1.8rem;
    }
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 1rem;
      margin: 1.4rem 0 1.8rem;
    }
    .card {
      display: block;
      padding: 1rem 1.1rem;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: #fffdf9;
      text-decoration: none;
      color: inherit;
    }
    .card:hover {
      border-color: #bba778;
      transform: translateY(-1px);
    }
    .card strong {
      display: block;
      font-size: 1.05rem;
      margin-bottom: 0.35rem;
    }
    .note-box {
      padding: 1rem 1.1rem;
      border-left: 4px solid var(--accent);
      background: var(--accent-soft);
      border-radius: 10px;
      margin: 1.25rem 0;
    }
    .footer-note {
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.95rem;
    }
    pre {
      overflow-x: auto;
      padding: 1rem;
      border-radius: 10px;
      position: relative;
      background: var(--code-bg);
      border: 1px solid #e1e3e8;
    }
    .copy-code-btn {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      border: 1px solid #c9c9c9;
      background: #fff;
      color: #222;
      border-radius: 4px;
      font-size: 0.75rem;
      padding: 0.2rem 0.5rem;
      cursor: pointer;
    }
    .copy-code-btn:hover {
      background: #f2f2f2;
    }
    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    table {
      border-collapse: collapse;
      width: auto;
      max-width: 100%;
      display: block;
      overflow-x: auto;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 0.45rem 0.65rem;
      text-align: left;
      vertical-align: top;
      background: rgba(255, 255, 255, 0.8);
    }
    a {
      color: var(--accent);
    }
    .output-tabs {
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.62);
      overflow: hidden;
    }
    .output-tab-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      padding: 0.85rem 0.9rem 0;
      border-bottom: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.45);
    }
    .output-tab-btn {
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.82);
      color: var(--muted);
      border-radius: 10px 10px 0 0;
      padding: 0.45rem 0.8rem;
      font: inherit;
      cursor: pointer;
    }
    .output-tab-btn-active {
      background: var(--accent-soft);
      color: var(--accent);
      border-bottom-color: var(--accent-soft);
      font-weight: 600;
    }
    .output-tab-panel {
      padding: 1rem 1rem 0.7rem;
    }
    .output-tab-panel[hidden] {
      display: none;
    }
    .output-tab-panel p:first-child {
      margin-top: 0;
    }
    .output-tab-generate-block {
      margin: 0.9rem 0 1rem;
    }
    @media (max-width: 700px) {
      main {
        margin: 1rem;
        padding: 1.2rem;
      }
      .page-nav {
        gap: 0.5rem;
      }
      .page-nav a {
        font-size: 0.9rem;
      }
      .page-nav .page-nav-edit {
        margin-left: 0;
      }
    }
  </style>
</head>
<body class="{{ page_class }}">
  <main>
{{ content }}
  </main>
</body>
</html>
